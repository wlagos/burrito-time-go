name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-AppleSilicon
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-Intel

          # ──────────────────────────────────────────────────────────────
          # WINDOWS BUILD - uncomment the 3 lines below to enable
          # ──────────────────────────────────────────────────────────────
          # - platform: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   name: Windows

          # ──────────────────────────────────────────────────────────────
          # LINUX BUILD - uncomment the 3 lines below to enable
          # ──────────────────────────────────────────────────────────────
          # - platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   name: Linux

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ──────────────────────────────────────────────────────────────────
      # LINUX SYSTEM DEPENDENCIES
      # If you enable the Linux build above, this step will automatically
      # run only for Linux. No changes needed here.
      # ──────────────────────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JS dependencies
        run: npm install

      - name: Generate RGBA icons
        shell: bash
        run: |
          mkdir -p src-tauri/icons
          pip3 install Pillow --break-system-packages
          python3 -c "
from PIL import Image

def make_icon(size, path):
    img = Image.new('RGBA', (size, size), (224, 123, 57, 255))
    img.save(path, 'PNG')

make_icon(32,  'src-tauri/icons/32x32.png')
make_icon(128, 'src-tauri/icons/128x128.png')
make_icon(256, 'src-tauri/icons/128x128@2x.png')
make_icon(256, 'src-tauri/icons/icon_256.png')
make_icon(256, 'src-tauri/icons/icon.ico')
make_icon(256, 'src-tauri/icons/icon.icns')
print('Icons generated OK')
"

      - name: Build proper icns (macOS only)
        run: |
          mkdir -p src-tauri/icons/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size src-tauri/icons/icon_256.png --out src-tauri/icons/icon.iconset/icon_${size}x${size}.png 2>/dev/null || true
          done
          iconutil -c icns src-tauri/icons/icon.iconset -o src-tauri/icons/icon.icns

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload macOS artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      # ──────────────────────────────────────────────────────────────────
      # WINDOWS ARTIFACT - uncomment the block below when Windows is enabled
      # ──────────────────────────────────────────────────────────────────
      # - name: Upload Windows artifact
      #   if: matrix.platform == 'windows-latest'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ${{ matrix.name }}
      #     path: src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      # ──────────────────────────────────────────────────────────────────
      # LINUX ARTIFACT - uncomment the block below when Linux is enabled
      # ──────────────────────────────────────────────────────────────────
      # - name: Upload Linux artifact
      #   if: matrix.platform == 'ubuntu-22.04'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ${{ matrix.name }}
      #     path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
